<body>
<div class="container">
  <div>
    <div class="title">Code Scanner</div>
    <div class="subtitle">Point camera at your code</div>
  </div>
  <div class="scanner-wrap" id="scannerWrap">
    <div class="scanner-box" id="scannerBox">
      <div class="camera-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p>Camera inactive</p>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-line"></div>
    </div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div class="status" id="status">AWAITING ACTIVATION</div>
  <button class="btn-start" id="btnStart" onclick="startScanner()">
    <span>▶ Start Scanning</span>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-badge" id="modalBadge">CODE</div>
    <div class="modal-title" id="modalTitle">Instructions</div>
    <ul class="modal-instructions" id="modalInstructions"></ul>
    <button class="modal-close" onclick="closeModal()">✕ &nbsp; Dismiss</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  const CODE_DB = {
    "JK56": {
      title: "Jumping Jacks Challenge",
      instructions: [
        "Do jumping jacks every single day.",
        "Complete at least 300 jumping jacks per day.",
        "No rest days — stay consistent!"
      ]
    },
    "XZ11": {
      title: "Push-Up Challenge",
      instructions: [
        "Complete 100 push-ups every day.",
        "Absolutely no skips allowed.",
        "Stay disciplined and track your streak!"
      ]
    }
  };

  let stream = null, scanning = false, scanInterval = null, lastDetected = null, cooldown = false;
  const video = document.getElementById('video');
  const placeholder = document.getElementById('placeholder');
  const scannerBox = document.getElementById('scannerBox');
  const statusEl = document.getElementById('status');
  const btnStart = document.getElementById('btnStart');

  async function startScanner() {
    if (scanning) { stopScanner(); return; }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      scannerBox.classList.add('scanning');
      scanning = true;
      btnStart.querySelector('span').textContent = '■ Stop Scanning';
      statusEl.textContent = 'SCANNING…';
      statusEl.className = 'status active';
      scanInterval = setInterval(captureAndRecognize, 1800);
    } catch (e) {
      statusEl.textContent = 'CAMERA ACCESS DENIED';
      alert('Camera permission is required. Please allow camera access and try again.');
    }
  }

  function stopScanner() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    clearInterval(scanInterval);
    scanning = false;
    video.style.display = 'none';
    placeholder.style.display = '';
    scannerBox.classList.remove('scanning');
    btnStart.querySelector('span').textContent = '▶ Start Scanning';
    statusEl.textContent = 'SCANNER STOPPED';
    statusEl.className = 'status';
  }

  async function captureAndRecognize() {
    if (!scanning || cooldown) return;
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.filter = 'grayscale(1) contrast(2) brightness(1.1)';
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    try {
      const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
        psm: 11
      });
      checkForCodes(text.replace(/\s+/g, '').toUpperCase());
    } catch (_) {}
  }

  function checkForCodes(rawText) {
    for (const code of Object.keys(CODE_DB)) {
      if (rawText.includes(code)) {
        if (lastDetected === code) return;
        lastDetected = code;
        cooldown = true;
        triggerDetection(code);
        setTimeout(() => { cooldown = false; }, 4000);
        return;
      }
    }
  }

  function triggerDetection(code) {
    statusEl.textContent = 'CODE DETECTED: ' + code;
    statusEl.className = 'status detected';
    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    document.getElementById('scannerWrap').appendChild(ring);
    setTimeout(() => ring.remove(), 700);
    const entry = CODE_DB[code];
    document.getElementById('modalBadge').textContent = code;
    document.getElementById('modalTitle').textContent = entry.title;
    const ul = document.getElementById('modalInstructions');
    ul.innerHTML = '';
    entry.instructions.forEach(line => {
      const li = document.createElement('li');
      li.textContent = line;
      ul.appendChild(li);
    });
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    lastDetected = null;
    if (scanning) { statusEl.textContent = 'SCANNING…'; statusEl.className = 'status active'; }
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
</script>
</body>
</html>
